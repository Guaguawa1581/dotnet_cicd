services:
  api:
    image: dotnet-apiserver:latest
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING}
    networks:
      - app-network
    restart: unless-stopped

  nginx:
    image: dotnet-nginx:latest
    ports:
      - "${APP_PORT:-5088}:80"
    depends_on:
      - api
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
